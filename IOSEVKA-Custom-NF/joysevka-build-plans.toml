[buildPlans.JoySevka]
family = "JoySevka"
spacing = "normal"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

  [buildPlans.JoySevka.variants]
  inherits = "ss20"

    [buildPlans.JoySevka.variants.design]
    capital-i = "short-serifed"
    e = "flat-crossbar"
    f = "flat-hook-serifless-crossbar-at-x-height"
    i = "serifed-flat-tailed"
    j = "serifed"
    k = "curly-serifless"
    l = "serifed-semi-tailed"
    m = "short-leg-serifless"
    r = "serifless"
    t = "flat-hook"
    braille-dot = "round"
    asterisk = "hex-low"
    paren = "flat-arc"
    brace = "curly-flat-boundary"
    number-sign = "upright-tall"
    at = "threefold"
    percent = "rings-continuous-slash"
    pilcrow = "low"
    lig-ltgteq = "slanted"
    lig-equal-chain = "with-notch"
    lig-hyphen-chain = "with-notch"
    lig-plus-chain = "without-notch"

    [buildPlans.JoySevka.variants.italic]
    one = "no-base-long-top-serif"
    two = "straight-neck-serifless"
    four = "open-serifless"
    five = "oblique-flat-serifless"
    six = "straight-bar"
    seven = "curly-serifless-crossbar"
    eight = "crossing"
    nine = "straight-bar"
    zero = "oval-tall-reverse-slashed"
    capital-a = "curly-serifless"
    capital-b = "more-asymmetric-interrupted-serifless"
    capital-e = "serifless"
    capital-f = "serifless"
    capital-g = "toothless-rounded-serifless-hooked"
    capital-i = "serifed"
    capital-l = "serifless"
    capital-m = "slanted-sides-hanging-serifless"
    capital-n = "asymmetric-serifless"
    capital-q = "crossing-curly-tailed"
    capital-r = "curly-open-serifless"
    capital-s = "serifless"
    capital-z = "curly-serifless-with-crossbar"
    a = "single-storey-top-cut-tailed"
    b = "bottom-cut-serifless"
    c = "serifless"
    d = "tailed-serifless"
    e = "rounded"
    f = "tailed"
    g = "double-storey-open"
    h = "tailed-serifless"
    i = "tailed-serifed"
    j = "serifless"
    k = "cursive-bottom-right-serifed"
    l = "tailed-serifed"
    m = "short-leg-tailed-serifless"
    n = "tailed-serifless"
    p = "eared-serifless"
    q = "diagonal-tailed-serifless"
    r = "serifless"
    s = "serifless"
    t = "bent-hook"
    u = "tailed-serifless"
    v = "cursive-serifless"
    w = "cursive-serifless"
    x = "semi-chancery-straight-serifless"
    y = "cursive-serifless"
    z = "cursive"
    tittle = "round"
    braille-dot = "round"
    asterisk = "penta-low"
    paren = "flat-arc"
    brace = "curly-flat-boundary"
    number-sign = "slanted-open"
    ampersand = "lower-open"
    at = "fourfold-solid-inner-tall"
    dollar = "slanted-interrupted"
    percent = "rings-segmented-slash"
    question = "smooth"
    pilcrow = "low"
    lig-ltgteq = "slanted"
    lig-neq = "more-slanted"
    lig-equal-chain = "with-notch"
    lig-hyphen-chain = "with-notch"
    lig-plus-chain = "with-notch"
    lig-double-arrow-bar = "without-notch"
    lig-single-arrow-bar = "without-notch"

[buildPlans.JoySevka.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.JoySevka.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.JoySevka.widths.Normal]
shape = 600
menu = 5
css = "normal"

[buildPlans.JoySevka.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.JoySevka.slopes.Italic]
angle = 12
shape = "italic"
menu = "italic"
css = "italic"